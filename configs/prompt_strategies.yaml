# ============================================================
# XRL System — プロンプト戦略設定
# ============================================================
# few_shot と cot の挙動をここで調整します。
# コードを変更せず、このファイルを編集するだけで試行評価できます。
# ============================================================

# ============================================================
# Few-shot 設定
# ============================================================
few_shot:
  # プロンプトへの挿入位置: "before_state" | "after_desc"
  #   before_state : センサー状態ブロックの直前に挿入
  #   after_desc   : センサー説明ブロックの直後 (system prompt 内) に挿入
  placement: "before_state"

  # 例示リスト (上から順にプロンプトへ挿入される)
  examples:
    - input: |
        【センサー状態】
          altitude: 3200.00
          speed: 420.00
          distance: 1800.00
          ata: 30.00
          aspect_angle: 160.00
        【操舵入力】
          aileron: 0.20
          elevator: 0.60
          throttle: 0.90
      output: |
        敵機との距離が1800mと比較的近く、ATA角30°は攻撃チャンス圏内にある。
        アスペクト角160°から敵機は自機をほぼ背後に捉えており、優位な態勢にある。
        エレベータを0.60まで引き、機首を上げることで高度エネルギーを確保しつつ、
        スロットル0.90で速度を維持。小さなエルロン入力で旋回方向を微調整している。

    - input: |
        【センサー状態】
          altitude: 1500.00
          speed: 280.00
          distance: 4500.00
          ata: 85.00
          aspect_angle: 40.00
        【操舵入力】
          aileron: -0.80
          elevator: -0.20
          throttle: 1.00
      output: |
        ATA角85°は攻撃圏外であり、現状では有効な射撃機会がない。
        距離4500mと離れており、敵機はこちらをほぼ正面に捉えている (アスペクト角40°)。
        スロットル全開で速度を回復しながら、大きな左エルロンと軽い機首下げで
        旋回しATA角を縮める機動を選択したと考えられる。

# ============================================================
# CoT (Chain-of-Thought) 設定
# ============================================================
cot:
  # 思考を促す冒頭指示 (ユーザープロンプト末尾に付加される)
  preamble: "まず以下の手順で論理的に推論してから、最後に結論を簡潔にまとめてください。"

  # 思考ステップ (番号付きリストとして展開される)
  steps:
    - "現在の高度・速度からエネルギー状態を評価する"
    - "敵機との距離・ATA角・アスペクト角から戦術的優劣を判断する"
    - "各操舵入力 (aileron/elevator/throttle) がその状況にどう対応しているか考える"
    - "上記を踏まえ、エージェントが選択した行動の意図を1〜2文で述べる"

  # 結論セクションの見出しラベル
  conclusion_label: "【結論】"
