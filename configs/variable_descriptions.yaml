# ============================================================
# XRL System — センサー・操舵変数の説明テキスト管理
# ============================================================
# プロンプトテンプレート内の {VARIABLE_NAME} プレースホルダーに
# 対応する説明テキストを定義します。
#
# 例: テンプレート内の {ALTITUDE} はこのファイルの
#     sensor.altitude の値に置き換えられます。
# ============================================================

# ---- センサー変数の説明 ----------------------------------------
sensor:
  altitude: "高度 (m)"
  speed: "速度 (kt)"
  distance: "敵機との距離 (m)"
  ata: "自機から敵機へのATA角度 (°) ※45°未満が攻撃チャンス"
  aspect_angle: "敵機から自機への角度 (°)"

# ---- 操舵変数の説明 --------------------------------------------
action:
  aileron: "エルロン (-1=左ロール, +1=右ロール)"
  elevator: "エレベータ (-1=機首下げ, +1=機首上げ)"
  throttle: "スロットル (0=アイドル, 1=最大推力)"
